name: Build and Publish Bridge

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        default: stable
        type: choice
        options:
          - beta
          - stable
  push:
    tags:
      - "bridge-v*"

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            target_key: windows-x86_64
            json_name: windows-x86_64.json
          - os: macos-latest
            platform: darwin
            target_key: darwin-aarch64
            json_name: darwin-aarch64.json
          - os: ubuntu-22.04
            platform: linux
            target_key: linux-x86_64
            json_name: linux-x86_64.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
          cache-on-failure: true

      - name: Cache Tauri CLI
        id: cache-tauri-cli
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-tauri
            ~/.cargo/bin/cargo-tauri.exe
          key: tauri-cli-v2-${{ runner.os }}-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            tauri-cli-v2-${{ runner.os }}-

      - name: Install Tauri CLI
        if: steps.cache-tauri-cli.outputs.cache-hit != 'true'
        run: cargo install tauri-cli --locked --version "^2.0.0"

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            CHANNEL="${{ inputs.channel }}"
          elif [[ "${GITHUB_REF_NAME}" == *"-beta"* ]]; then
            CHANNEL="beta"
          else
            CHANNEL="stable"
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#bridge-v}"
          else
            VERSION="$(node -p "require('./backend/tauri.conf.json').version")"
          fi

          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Channel: ${CHANNEL}"
          echo "Version: ${VERSION}"

      - name: Sync app version from tag
        run: node scripts/sync-version.mjs "${{ steps.meta.outputs.version }}"

      - name: Verify frontend web assets
        run: test -f frontend/dist/index.html && test -f frontend/dist/console.html

      - name: Validate updater signing secret
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]]; then
            echo "::error::Missing GitHub secret TAURI_SIGNING_PRIVATE_KEY"
            exit 1
          fi
          if printf '%s' "${TAURI_SIGNING_PRIVATE_KEY}" | grep -q '%'; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY contains '%' (invalid base64). Re-paste ~/.tauri/arcane-bridge.key with no URL encoding or quotes."
            exit 1
          fi
          if ! printf '%s' "${TAURI_SIGNING_PRIVATE_KEY}" | grep -q 'minisign'; then
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY does not look like a minisign key file — paste ~/.tauri/arcane-bridge.key (both lines), not the .pub file."
          fi

      - name: Build Tauri app (Windows NSIS)
        if: matrix.platform == 'windows'
        run: cargo tauri build --bundles nsis
        working-directory: backend
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build Tauri app (macOS DMG)
        if: matrix.platform == 'darwin'
        run: cargo tauri build --bundles app,dmg
        working-directory: backend
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build Tauri app (Linux deb)
        if: matrix.platform == 'linux'
        run: cargo tauri build --bundles deb
        working-directory: backend
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Collect installer and updater artifacts
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p upload
          VERSION="${{ steps.meta.outputs.version }}"
          CHANNEL="${{ steps.meta.outputs.channel }}"
          TAG="bridge-v${VERSION}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          TARGET_KEY="${{ matrix.target_key }}"
          JSON_NAME="${{ matrix.json_name }}"
          RELEASE_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          case "${{ matrix.platform }}" in
            windows)
              UPDATER_ARTIFACT="$(ls -1 backend/target/release/bundle/nsis/*.exe | head -n 1 || true)"
              BUNDLE_NAME="Arcane-Bridge-${VERSION}-windows-setup.exe"
              ;;
            darwin)
              UPDATER_ARTIFACT="$(ls -1 backend/target/release/bundle/macos/*.app.tar.gz | head -n 1 || true)"
              BUNDLE_NAME="Arcane-Bridge-${VERSION}-macos.app.tar.gz"
              DMG="$(ls -1 backend/target/release/bundle/dmg/*.dmg | head -n 1 || true)"
              ;;
            linux)
              UPDATER_ARTIFACT="$(ls -1 backend/target/release/bundle/deb/*.deb | head -n 1 || true)"
              BUNDLE_NAME="Arcane-Bridge-${VERSION}-linux-amd64.deb"
              ;;
            *)
              echo "::error::Unsupported platform"
              exit 1
              ;;
          esac

          if [[ -z "${UPDATER_ARTIFACT}" ]] || [[ ! -f "${UPDATER_ARTIFACT}" ]]; then
            echo "::error::No updater artifact found for ${{ matrix.platform }}"
            exit 1
          fi

          SIG_FILE="${UPDATER_ARTIFACT}.sig"
          if [[ ! -f "${SIG_FILE}" ]]; then
            echo "::error::Missing updater signature: ${SIG_FILE}"
            exit 1
          fi

          cp "${UPDATER_ARTIFACT}" "upload/${BUNDLE_NAME}"

          if [[ "${{ matrix.platform }}" == "darwin" ]]; then
            if [[ -z "${DMG}" ]] || [[ ! -f "${DMG}" ]]; then
              echo "::error::Missing macOS DMG installer"
              exit 1
            fi
            cp "${DMG}" "upload/Arcane-Bridge-${VERSION}-macos.dmg"
          fi

          SIGNATURE="$(tr -d '\r\n' < "${SIG_FILE}")"
          ARTIFACT_URL="${BASE_URL}/${BUNDLE_NAME}"
          NOTES="${CHANNEL} release ${VERSION}"

          cat > "upload/${JSON_NAME}" <<EOF
          {
            "version": "${VERSION}",
            "pub_date": "${RELEASE_DATE}",
            "notes": "${NOTES}",
            "platforms": {
              "${TARGET_KEY}": {
                "signature": "${SIGNATURE}",
                "url": "${ARTIFACT_URL}"
              }
            }
          }
          EOF

          ls -la upload

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: arcane-bridge-${{ matrix.platform }}-${{ steps.meta.outputs.version }}
          path: upload/*
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/bridge-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: arcane-bridge-*
          merge-multiple: true

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#bridge-v}"
          if [[ "${GITHUB_REF_NAME}" == *"-beta"* ]]; then
            CHANNEL="beta"
            PRERELEASE=true
          else
            CHANNEL="stable"
            PRERELEASE=false
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          ls -la release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Arcane Bridge v${{ steps.meta.outputs.version }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          body: |
            ## Install

            | Platform | File |
            |----------|------|
            | **Windows** | `Arcane-Bridge-*-windows-setup.exe` |
            | **macOS** | `Arcane-Bridge-*-macos.dmg` |
            | **macOS (piggyback)** | `Arcane-Bridge-*-macos.app.tar.gz` |
            | **Linux** | `Arcane-Bridge-*-linux-amd64.deb` |

            **In-app updates:** tray → *Check for updates…* (stable releases only; uses `darwin-aarch64.json`, `windows-x86_64.json`, `linux-x86_64.json` on this release).

            Hub runs **inside the Arcane Bridge tray app** — one process, no separate hub executable.

            Linux piggyback apps extract the `.deb` to `~/.local/share/arcane-bridge` (no sudo).

            Channel: **${{ steps.meta.outputs.channel }}**
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
